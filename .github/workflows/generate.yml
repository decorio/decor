name: Auto Generate SEO Site

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      # ================= KEYWORD GENERATOR =================
      - name: Generate Keywords
        shell: python
        run: |
          rooms = ["living room","bedroom","kitchen","bathroom","home office","apartment","dining room","balcony","entryway","kids room"]
          styles = ["modern","minimalist","boho","luxury","rustic","farmhouse","scandinavian","aesthetic","industrial"]
          modifiers = ["ideas","small space","apartment","on a budget","DIY","inspiration","setup","design","makeover","styling"]
          extras = ["easy","simple","creative","cheap","cozy","elegant"]

          keywords = set()

          for r in rooms:
              for s in styles:
                  for m in modifiers:
                      keywords.add(f"{s} {r} decor {m}")
                      for e in extras:
                          keywords.add(f"{s} {r} decor {m} {e}")

          with open("keyword.txt","w") as f:
              for kw in keywords:
                  f.write(kw + "\n")

          print("Total keywords:", len(keywords))

      # ================= SITE GENERATOR =================
      - name: Generate Site
        shell: python
        run: |
          import os, random
          from datetime import datetime

          BATCH_SIZE = 40

          domain = open("domain.txt").read().strip()

          with open("keyword.txt") as f:
              keywords = [k.strip() for k in f.readlines() if k.strip()]

          os.makedirs("posts", exist_ok=True)

          STATE_FILE = "last_index.txt"
          start = int(open(STATE_FILE).read().strip()) if os.path.exists(STATE_FILE) else 0

          end = start + BATCH_SIZE
          selected = keywords[start:end]

          with open(STATE_FILE, "w") as f:
              f.write(str(end))

          def paragraph():
              base = [
                  "Choosing the right colors sets the mood of your room.",
                  "Lighting plays an important role in interior design.",
                  "Furniture placement should balance style and comfort.",
                  "Textures can add depth and personality.",
                  "Small details can create a big impact."
              ]
              return "<p>" + " ".join(random.sample(base,3)) + "</p>"

          def related(current):
              items = random.sample([k for k in keywords if k != current], 3)
              html = "<h3>Related Posts</h3><div class='row'>"
              for i in items:
                  slug = i.replace(" ","-")
                  html += f"<div class='col-md-4'><a href='{slug}.html'>{i.title()}</a></div>"
              html += "</div>"
              return html

          # ========= POSTS =========
          for kw in selected:
              slug = kw.replace(" ","-")
              title = kw.title()

              html = f"""<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{title}</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="../style.css" rel="stylesheet">

</head>
<body>

<nav class="navbar navbar-dark bg-dark">
<div class="container">
<a class="navbar-brand" href="../index.html">Decor Blog</a>
</div>
</nav>

<div class="container mt-4">
<div class="row">

<div class="col-md-8">

<h1>{title}</h1>

<!-- ADS TOP -->
<div class="ads">ADS SPACE</div>

<img src="https://tse1.mm.bing.net/th?q={kw}&w=800" class="img-fluid mb-3">

{paragraph()}
{paragraph()}

<h2>Tips</h2>
<ul>
<li>Use natural lighting</li>
<li>Keep design simple</li>
<li>Add plants</li>
</ul>

<!-- ADS MIDDLE -->
<div class="ads">ADS SPACE</div>

<h2>Guide</h2>
{paragraph()}
{paragraph()}

{related(kw)}

<!-- ADS BOTTOM -->
<div class="ads">ADS SPACE</div>

</div>

<div class="col-md-4">
<h4>Popular</h4>
<ul>
<li>Home Decor Ideas</li>
<li>Modern Design</li>
<li>Small Space Tips</li>
</ul>

<div class="ads">ADS SPACE</div>
</div>

</div>
</div>

<footer class="bg-dark text-white text-center p-3 mt-4">
© 2026 Decor Blog
</footer>

</body>
</html>
"""

              with open(f"posts/{slug}.html","w",encoding="utf-8") as f:
                  f.write(html)

          # ========= HOMEPAGE =========
          posts = os.listdir("posts")
          random.shuffle(posts)

          index = """<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Decor Blog</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="style.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
<div class="container">
<a class="navbar-brand">Decor Blog</a>
</div>
</nav>

<div class="container mt-4">
<div class="row">
"""

          for p in posts[:30]:
              title = p.replace(".html","").replace("-"," ").title()
              index += f"""
<div class="col-md-4 mb-4">
<div class="card">
<img src="https://tse1.mm.bing.net/th?q={title}&w=400" class="card-img-top">
<div class="card-body">
<h5>{title}</h5>
<a href="posts/{p}" class="btn btn-primary btn-sm">Read</a>
</div>
</div>
</div>
"""

          index += """
</div>

<div class="ads text-center">ADS SPACE</div>

</div>

<footer class="bg-dark text-white text-center p-3 mt-4">
© 2026 Decor Blog
</footer>

</body>
</html>
"""

          open("index.html","w").write(index)

          # ========= SITEMAP =========
          sitemap = ['<?xml version="1.0"?>','<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">']
          for p in posts:
              sitemap.append(f"<url><loc>https://{domain}/posts/{p}</loc></url>")
          sitemap.append("</urlset>")
          open("sitemap.xml","w").write("\n".join(sitemap))

          print("Generated", len(selected), "posts")

      - name: Commit & Push
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@users.noreply.github.com"
          git add .
          git commit -m "update site" || echo "no changes"
          git push