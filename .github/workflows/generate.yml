name: Auto Generate SEO Site

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      # ===== KEYWORD GENERATOR =====
      - name: Generate Keywords
        shell: python
        run: |
          rooms = ["living room","bedroom","kitchen","bathroom","home office","apartment","dining room","balcony","entryway","kids room"]
          styles = ["modern","minimalist","boho","luxury","rustic","farmhouse","scandinavian","aesthetic","industrial"]
          modifiers = ["ideas","small space","apartment","on a budget","DIY","inspiration","setup","design","makeover","styling"]
          extras = ["easy","simple","creative","cheap","cozy","elegant"]

          keywords = set()

          for r in rooms:
              for s in styles:
                  for m in modifiers:
                      keywords.add(s + " " + r + " decor " + m)
                      for e in extras:
                          keywords.add(s + " " + r + " decor " + m + " " + e)

          f = open("keyword.txt","w")
          for kw in keywords:
              f.write(kw + "\n")
          f.close()

          print("Total keywords:", len(keywords))

      # ===== SITE GENERATOR =====
      - name: Generate Site
        shell: python
        run: |
          import os, random

          BATCH_SIZE = 40

          domain = open("domain.txt").read().strip()
          keywords = [k.strip() for k in open("keyword.txt").readlines() if k.strip()]

          os.makedirs("posts", exist_ok=True)

          start = 0
          if os.path.exists("last_index.txt"):
              start = int(open("last_index.txt").read().strip())

          end = start + BATCH_SIZE
          selected = keywords[start:end]

          open("last_index.txt","w").write(str(end))

          def paragraph():
              base = [
                  "Choosing the right colors sets the mood of your room.",
                  "Lighting plays an important role in interior design.",
                  "Furniture placement should balance style and comfort.",
                  "Textures can add depth and personality.",
                  "Small details can create a big impact."
              ]
              return "<p>" + " ".join(random.sample(base,3)) + "</p>"

          def related(current):
              items = random.sample([k for k in keywords if k != current], 3)
              html = "<h3>Related Posts</h3><ul>"
              for i in items:
                  slug = i.replace(" ","-")
                  html += "<li><a href='" + slug + ".html'>" + i.title() + "</a></li>"
              html += "</ul>"
              return html

          # ===== GENERATE POSTS =====
          for kw in selected:
              slug = kw.replace(" ","-")
              title = kw.title()

              html = ""
              html += "<!DOCTYPE html><html><head>"
              html += "<meta charset='UTF-8'>"
              html += "<meta name='viewport' content='width=device-width, initial-scale=1'>"
              html += "<title>" + title + "</title>"
              html += "<link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css' rel='stylesheet'>"
              html += "<link href='../style.css' rel='stylesheet'>"
              html += "</head><body>"

              html += "<nav class='navbar navbar-dark bg-dark'><div class='container'>"
              html += "<a class='navbar-brand' href='../index.html'>Decor Blog</a>"
              html += "</div></nav>"

              html += "<div class='container mt-4'><div class='row'>"

              html += "<div class='col-md-8'>"
              html += "<h1>" + title + "</h1>"

              html += "<div class='ads'>ADS SPACE</div>"

              html += "<img src='https://tse1.mm.bing.net/th?q=" + kw + "&w=800' class='img-fluid mb-3'>"

              html += paragraph()
              html += paragraph()

              html += "<h2>Tips</h2><ul>"
              html += "<li>Use natural lighting</li>"
              html += "<li>Keep design simple</li>"
              html += "<li>Add plants</li>"
              html += "</ul>"

              html += "<div class='ads'>ADS SPACE</div>"

              html += "<h2>Guide</h2>"
              html += paragraph()
              html += paragraph()

              html += related(kw)

              html += "<div class='ads'>ADS SPACE</div>"

              html += "</div>"

              html += "<div class='col-md-4'>"
              html += "<h4>Popular</h4>"
              html += "<ul><li>Home Decor</li><li>Modern</li><li>Small Space</li></ul>"
              html += "<div class='ads'>ADS SPACE</div>"
              html += "</div>"

              html += "</div></div>"

              html += "<footer class='bg-dark text-white text-center p-3 mt-4'>© 2026 Decor Blog</footer>"
              html += "</body></html>"

              open("posts/" + slug + ".html","w").write(html)

          # ===== HOMEPAGE =====
          posts = os.listdir("posts")
          random.shuffle(posts)

          index = ""
          index += "<!DOCTYPE html><html><head>"
          index += "<meta charset='UTF-8'>"
          index += "<meta name='viewport' content='width=device-width, initial-scale=1'>"
          index += "<title>Decor Blog</title>"
          index += "<link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css' rel='stylesheet'>"
          index += "<link href='style.css' rel='stylesheet'>"
          index += "</head><body>"

          index += "<nav class='navbar navbar-dark bg-dark'><div class='container'>"
          index += "<a class='navbar-brand'>Decor Blog</a></div></nav>"

          index += "<div class='container mt-4'><div class='row'>"

          for p in posts[:30]:
              t = p.replace(".html","").replace("-"," ").title()
              index += "<div class='col-md-4 mb-4'>"
              index += "<div class='card'>"
              index += "<img src='https://tse1.mm.bing.net/th?q=" + t + "&w=400' class='card-img-top'>"
              index += "<div class='card-body'>"
              index += "<h5>" + t + "</h5>"
              index += "<a href='posts/" + p + "' class='btn btn-primary btn-sm'>Read</a>"
              index += "</div></div></div>"

          index += "</div>"
          index += "<div class='ads'>ADS SPACE</div>"
          index += "</div>"

          index += "<footer class='bg-dark text-white text-center p-3 mt-4'>© 2026 Decor Blog</footer>"
          index += "</body></html>"

          open("index.html","w").write(index)

          # ===== SITEMAP =====
          sitemap = ["<?xml version='1.0'?>","<urlset xmlns='http://www.sitemaps.org/schemas/sitemap/0.9'>"]
          for p in posts:
              sitemap.append("<url><loc>https://" + domain + "/posts/" + p + "</loc></url>")
          sitemap.append("</urlset>")
          open("sitemap.xml","w").write("\n".join(sitemap))

          print("Generated:", len(selected), "posts")

      - name: Commit & Push
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@users.noreply.github.com"
          git add .
          git commit -m "auto update" || echo "no changes"
          git push